name: Checks

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  actions: read
  contents: read
  pull-requests: write  # For commenting on PRs

jobs:
  # Fast fail job - catches obvious issues quickly
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate prisma types
        run: yarn prisma generate
      
      - name: Type check
        run: yarn tsc --noEmit
      
      - name: Check formatting
        run: yarn prettier --check src/**.ts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: quick-checks  # Only run if quick checks pass
    steps:
      - uses: actions/checkout@v4
      
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate prisma types
        run: yarn prisma generate
      
      - name: Lint
        run: yarn lint

  # test:
  #   name: Test
  #   runs-on: ubuntu-latest
  #   needs: quick-checks
    
  #   # Test matrix for multiple Node versions
  #   strategy:
  #     matrix:
  #       node-version: ['20.x', '24.x']
    
  #   steps:
  #     - uses: actions/checkout@v4
      
  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version: ${{ matrix.node-version }}
  #         cache: 'yarn'
      
  #     - name: Enable Corepack
  #       run: corepack enable
      
  #     - name: Install dependencies
  #       run: yarn install --frozen-lockfile
      
  #     # Run tests with coverage
  #     - name: Run tests
  #       run: yarn test:cov
      
  #     # Upload coverage to Codecov (optional)
  #     - name: Upload coverage
  #       uses: codecov/codecov-action@v4
  #       if: matrix.node-version == '24.x'
  #       with:
  #         files: ./coverage/lcov.info
  #         flags: unittests
  #         name: codecov-umbrella
  #         fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate prisma types
        run: yarn prisma generate
      
      - name: Build
        run: yarn build
      
      # Cache build artifacts for deployment
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # All checks must pass
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [quick-checks, lint, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.quick-checks.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
            echo "One or more checks failed"
            exit 1
          fi
      
      - name: Success
        run: echo "All checks passed! ✅"s
