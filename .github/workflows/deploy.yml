name: CI/CD

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main, dev]

jobs:
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma types
        run: yarn prisma generate

      - name: Type check
        run: yarn tsc --noEmit

      - name: Check formatting
        run: yarn prettier --check "src/**/*.ts"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma types
        run: yarn prisma generate

      - name: Lint
        run: yarn lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma types
        run: yarn prisma generate

      - name: Run tests
        run: yarn test:cov

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ttt-key.pem
          chmod 600 ~/.ssh/ttt-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Write Kamal secrets
        run: |
          cat > .kamal/secrets <<'EOF'
          KAMAL_REGISTRY_PASSWORD=$(aws ecr get-login-password --region eu-west-1)
          POSTGRES_USER=$(aws ssm get-parameter --name /ttt/prod/POSTGRES_USER --region eu-west-1 --query Parameter.Value --output text)
          POSTGRES_PASSWORD=$(aws ssm get-parameter --name /ttt/prod/POSTGRES_PASSWORD --with-decryption --region eu-west-1 --query Parameter.Value --output text)
          POSTGRES_DB=$(aws ssm get-parameter --name /ttt/prod/POSTGRES_DB --region eu-west-1 --query Parameter.Value --output text)
          REDIS_PASSWORD=$(aws ssm get-parameter --name /ttt/prod/REDIS_PASSWORD --with-decryption --region eu-west-1 --query Parameter.Value --output text)
          EOF

      - name: Deploy
        run: kamal deploy
